name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (build + tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore Registration.sln

      - name: Build
        run: dotnet build Registration.sln -c Release --no-restore

      - name: Domain unit tests
        run: dotnet test tests/Registration.Domain.UnitTests -c Release --no-build --verbosity normal

      - name: Application unit tests
        run: dotnet test tests/Registration.Application.UnitTests -c Release --no-build --verbosity normal

      # Linux runners ship with Docker, so Testcontainers spins up SQL Server 2019.
      - name: Integration tests (Testcontainers SQL Server 2019)
        run: dotnet test tests/Registration.IntegrationTests -c Release --no-build --verbosity normal

  frontend:
    name: Frontend (build + tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build

  docker:
    name: Docker images build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build API and frontend images
        run: docker compose -f docker/docker-compose.yml build
