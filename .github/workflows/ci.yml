name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (build + tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    # A SQL Server 2019 service container is the most reliable way to run the
    # integration tests on the runner; the factory targets it via INTEGRATION_TEST_DB.
    services:
      sqlserver:
        image: mcr.microsoft.com/mssql/server:2019-latest
        env:
          ACCEPT_EULA: "Y"
          MSSQL_SA_PASSWORD: "Your_strong!Passw0rd"
          MSSQL_PID: Developer
        ports:
          - 1433:1433
        options: >-
          --health-cmd "/opt/mssql-tools18/bin/sqlcmd -C -S localhost -U sa -P Your_strong!Passw0rd -Q 'SELECT 1' -b || /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P Your_strong!Passw0rd -Q 'SELECT 1' -b"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 20
          --health-start-period 30s

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore Registration.sln

      - name: Build
        run: dotnet build Registration.sln -c Release --no-restore

      - name: Domain unit tests
        run: dotnet test tests/Registration.Domain.UnitTests -c Release --no-build --verbosity normal

      - name: Application unit tests
        run: dotnet test tests/Registration.Application.UnitTests -c Release --no-build --verbosity normal

      - name: Integration tests
        env:
          INTEGRATION_TEST_DB: "Server=127.0.0.1,1433;Database=RegistrationDb_CI;User Id=sa;Password=Your_strong!Passw0rd;TrustServerCertificate=True;Encrypt=False"
        run: dotnet test tests/Registration.IntegrationTests -c Release --no-build --verbosity normal

  frontend:
    name: Frontend (build + tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build

  docker:
    name: Docker images build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build API and frontend images
        run: docker compose -f docker/docker-compose.yml build
